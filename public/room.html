<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ArtArena — Create or Join Room</title>
    <link rel="stylesheet" href="css/room.css">
    <link rel="icon" type="image/png" href="images/logo2.png">
</head>
<body>
    <div class="room-page">
        <header>
            <a href="index.html" class="logo-link">
                <h1 class="artarena-logo">
                    <span>A</span><span>r</span><span>t</span>
                    <span>A</span><span>r</span><span>e</span><span>n</span><span>a</span>
                    <img src="images/paintpalette.png" alt="Palette" class="palette-icon">
                </h1>
            </a>
        </header>

        <div class="room-content">
            <!-- Create Room -->
            <div class="room-card create-card">
                <h2>Create a Room</h2>
                <p>Start a new game and invite friends with your room code.</p>
                <button id="createRoomBtn" class="btn-primary">➕ Create Room</button>

                <div id="roomCodeDisplay" style="display:none;" class="room-code-box">
                    <p>Share this code with friends:</p>
                    <div class="code-display">
                        <span id="roomCode"></span>
                        <button onclick="navigator.clipboard.writeText(document.getElementById('roomCode').textContent)" class="copy-btn">📋 Copy</button>
                    </div>
                    <span id="hostBadge" class="host-badge" style="display:none;">👑 You are the Host</span>
                </div>

                <button id="startGameBtn" class="btn-start" style="display:none;">🚀 Start Game</button>
            </div>

            <!-- Join Room -->
            <div class="room-card join-card">
                <h2>Join a Room</h2>
                <p>Enter a 6-character room code to join a friend's game.</p>
                <div class="join-input-group">
                    <input type="text" id="roomCodeInput" placeholder="Enter Room Code" maxlength="6">
                    <button id="joinRoomBtn" class="btn-primary">🚪 Join</button>
                </div>
                <p id="joinStatus" class="join-status"></p>
            </div>

            <!-- Players in Room -->
            <div class="room-card players-card">
                <h2>Players in Room</h2>
                <p id="playerCount">0 players in room</p>
                <ul id="playerList"></ul>
            </div>
        </div>
    </div>

    <script src="/socket.io/socket.io.js"></script>
    <script src="js/room.js"></script>
</body>
</html>
